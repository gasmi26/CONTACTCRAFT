
<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::content},~{::title},~{::script})}"
      xmlns:th="http://www.w3.org/1999/xhtml">

<head>
  <title>Home page</title>
</head>

<body>

<section th:fragment="content">

  <!-- HERO -->
  <section class="bg-blue-600 dark:bg-black text-white py-20">
    <div class="container mx-auto text-center">

      <h2 class="text-4xl font-bold mb-4">
        Welcome to CONTACT CRAFT
      </h2>

      <p class="text-lg mb-8">
        Manage all your contacts effortlessly and securely in one place.
      </p>

      <a href="/login"
         class="bg-white text-blue-600 px-6 py-3 rounded-full font-semibold">
        Get Started
      </a>

    </div>
  </section>

  <!-- FEATURES -->
  <section class="py-20 bg-white dark:bg-gray-900">
    <div class="container mx-auto text-center">

      <h2 class="text-3xl font-bold mb-12 text-black dark:text-white">
        Features
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="p-6 bg-gray-100 dark:bg-gray-800 rounded shadow">
          <i class="fas fa-address-book text-blue-600 text-4xl mb-4"></i>
          <h3 class="text-xl font-semibold mb-2">Easy Contact Management</h3>
        </div>

        <div class="p-6 bg-gray-100 dark:bg-gray-800 rounded shadow">
          <i class="fas fa-lock text-blue-600 text-4xl mb-4"></i>
          <h3 class="text-xl font-semibold mb-2">Secure Storage</h3>
        </div>

        <div class="p-6 bg-gray-100 dark:bg-gray-800 rounded shadow">
          <i class="fas fa-globe text-blue-600 text-4xl mb-4"></i>
          <h3 class="text-xl font-semibold mb-2">24/7 Access</h3>
        </div>

      </div>
    </div>
  </section>

  <!-- CHAT BUTTON -->
  <button id="chatBtn">💬</button>

  <!-- CHAT BOX -->
  <div id="chatBox">

    <div class="chat-header">
      Chat with Bot
    </div>

    <div id="chatMessages" class="chat-messages"></div>

    <div class="chat-input">
      <input id="userInput" placeholder="Ask something..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</section>

<!-- SCRIPT -->
<th:block th:fragment="script">

  <style>

    #chatBtn{
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: #2563eb;
        color: white;
        font-size: 28px;
        border: none;
        cursor: pointer;
        z-index: 99999;
    }

    #chatBox{
     position: fixed;
    bottom: 100px;
    right: 25px;

    width: 360px;

    /* ✅ Better than fixed height */
    height: calc(100vh - 200px);
    max-height: 520px;
    min-height: 400px;

    background: #0f172a;

    display: none;
    flex-direction: column;

    border: 2px solid #334155;
    border-radius: 14px;

    overflow: hidden;

    z-index: 99999;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .chat-header{
    background: #1d4ed8;   /* better blue */
    color: white;
    padding: 10px;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    height:auto;
    width: 100%;           /* IMPORTANT */
    flex-shrink: 0;        /* IMPORTANT */
    }

    .chat-messages{
     flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    }

    .msg{
        padding: 10px 12px;
        border-radius: 10px;
        max-width: 75%;
        font-size: 14px;
        white-space: pre-line;
    }

    .user{
        background: #2563eb;
        color: white;
        align-self: flex-end;
    }

    .bot{
        background: #1f2937;
        color: #e5e7eb;
        align-self: flex-start;
    }

    .chat-input{
        display: flex;
        padding: 10px;
        border-top: 1px solid #334155;
        background: #111827;
    }

    .chat-input input{
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #1f2937;
        color: white;
    }

    .chat-input button{
        margin-left: 8px;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
    }

    .chat-input button:hover{
        background: #1d4ed8;
    }

    .menu-btn{
        padding: 8px;
        margin-top: 5px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        color: white;
        background: #374151;
    }

    .menu-btn:hover{
        background: #4b5563;
    }

  </style>

  <script>

    document.addEventListener("DOMContentLoaded", function () {

        const chatBtn = document.getElementById("chatBtn");
        const chatBox = document.getElementById("chatBox");
        const chatMessages = document.getElementById("chatMessages");
        const userInput = document.getElementById("userInput");

        let step = 0;
        let userName = "";

        chatBtn.addEventListener("click", () => {
            chatBox.style.display =
                chatBox.style.display === "flex" ? "none" : "flex";

                addMessage("👋 Type 'hi' to start chatting", "bot");
        });

        function addMessage(text, type){
            const div = document.createElement("div");
            div.className = "msg " + type;
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showMenu() {

            const menu = document.createElement("div");
            menu.className = "msg bot";

            menu.innerHTML = `
                <button class="menu-btn" onclick="howToUse()">📘 How to use</button>
                <button class="menu-btn" onclick="goAbout()">ℹ️ About<</button>
                <button class="menu-btn" onclick="goContact()">📞 Contact</button>
                <button class="menu-btn" onclick="goServices()">🛠️ Want to know our Services?</button>
            `;

            chatMessages.appendChild(menu);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        window.sendMessage = function () {

            const msg = userInput.value.trim();
            if (!msg) return;

            addMessage("You: " + msg, "user");
            userInput.value = "";

            if (step === 0) {

                if (msg.toLowerCase() === "hi") {
                    addMessage("Hello! What is your name?", "bot");
                    step = 1;
                } else {
                    addMessage("Please type 'hi' to start.", "bot");
                }

            } else if (step === 1) {

                userName = msg;

                addMessage(" Hi " + userName + " 👋", "bot");
                addMessage("Choose an option below:", "bot");

                showMenu();
                step = 2;
            }
        };

        // ===== MENU ACTIONS =====

        window.goAbout = function () {
            window.location.href = "/about";
        };

        window.goContact = function () {
            window.location.href = "/contact";
        };
        window.goServices = function () {
            window.location.href = "/services";
        };

        window.howToUse = function () {

            addMessage("HOW TO USE (Step-by-step):", "bot");

            addMessage(
    `1. Open the website
    2. Click on Login / Register
    3. Go to dashboard
    4. Add your contacts
    5. Search or manage contacts anytime`,
            "bot");

        };

    });

  </script>

</th:block>

</body>
</html>

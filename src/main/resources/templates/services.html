<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{})}" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <title>Services</title>
</head>
<body>
<section id="content"class="pt-20">
  <h1 class="text-center text-3xl font-bold mb-6 text-gray-900 dark:text-white">Welcome to Services Page</h1>
  <h5 class="text-center text-2xl font-semibold mb-12 text-gray-700 dark:text-gray-300">Services offered</h5>

  <!-- Easy Contact Management -->
  <div class="p-6 bg-gray-100 dark:bg-gray-800 rounded shadow hover:shadow-lg transition duration-300 transform hover:scale-105 max-w-lg mx-auto mb-8 text-center">
    <i class="fas fa-address-book text-blue-600 text-4xl mb-4"></i>
    <h3 class="text-xl font-semibold mb-2 text-gray-900 dark:text-white">Easy Contact Management</h3>
    <p class="text-gray-600 dark:text-gray-300">Add, edit, and organize your contacts in a user-friendly interface.</p>
  </div>

  <!-- Secure Storage -->
  <div class="p-6 bg-gray-100 dark:bg-gray-800 rounded shadow hover:shadow-lg transition duration-300 transform hover:scale-105 max-w-lg mx-auto mb-8 text-center">
    <i class="fas fa-lock text-blue-600 text-4xl mb-4"></i>
    <h3 class="text-xl font-semibold mb-2 text-gray-900 dark:text-white">Secure Storage</h3>
    <p class="text-gray-600 dark:text-gray-300">Your data is protected with top-level encryption and security measures.</p>
  </div>

  <!-- 24/7 Access -->
  <div class="p-6 bg-gray-100 dark:bg-gray-800 rounded shadow hover:shadow-lg transition duration-300 transform hover:scale-105 max-w-lg mx-auto text-center">
    <i class="fas fa-globe text-blue-600 text-4xl mb-4"></i>
    <h3 class="text-xl font-semibold mb-2 text-gray-900 dark:text-white">24/7 Access</h3>
    <p class="text-gray-600 dark:text-gray-300">Access your contacts anytime, anywhere from any device.</p>
  </div>
</section>
</body>
</html>

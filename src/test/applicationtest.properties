# ===== Test Application Properties =====

# Use H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Cloudinary (mock in tests)
cloudinary.cloud.name=test-cloud
cloudinary.api.key=test-api-key
cloudinary.api.secret=test-api-secret

# Disable mail (mock in tests)
spring.mail.host=localhost
spring.mail.port=25

# Base URL for email verification links
server.baseUrl=http://localhost:8080

# OAuth (dummy values for tests)
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.github.client-id=test-github-client-id
spring.security.oauth2.client.registration.github.client-secret=test-github-client-secret

# Disable unnecessary auto-configurations in tests
spring.thymeleaf.cache=false
logging.level.com.scm=DEBUG

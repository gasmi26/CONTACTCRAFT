version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql_db_docker
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: scm
    ports:
      - "3307:3306"

    volumes:
      - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root1234

    ports:
      - "8082:80"
    depends_on:
      - mysql
  springboot:
    build: .
    container_name: scm_springboot_project
    environment:
      SERVER_PORT: 8081
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: scm
      MYSQL_USER: root
      MYSQL_PASSWORD: root1234

      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USERNAME: 
      EMAIL_PASSWORD: 
      EMAIL_DOMAIN: 

      CLOUDINARY_API_KEY: 
      CLOUDINARY_API_SECRET: 
      CLOUDINARY_NAME: 
    ports:
      - "8081:8080"
    depends_on:
      - mysql
volumes:
  mysql_data:
